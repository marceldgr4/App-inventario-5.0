<script>
// =================================================
// === FUNCIONES GENÉRICAS PARA TODAS LAS SECCIONES ===
// =================================================

// --- Manejo de Modales Genéricos ---
function abrirModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.classList.add("is-active");
}

function cerrarModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.classList.remove("is-active");
}

// --- Feedback de UI ---
function mostrarMensaje(mensaje, tipo = 'info') {
    console.log(`[MSG - ${tipo}]`, mensaje);
    if (typeof showToastNotification === "function") {
        showToastNotification(mensaje, tipo);
    } else {
        alert(mensaje);
    }
}

function showLoading(show = true, overlayId = "loadingOverlay") {
    const overlay = document.getElementById(overlayId);
    if (overlay) overlay.style.display = show ? "flex" : "none";
}

function hideLoading(overlayId = "loadingOverlay") {
    showLoading(false, overlayId);
}

function escapeHtml(unsafe) {
    if (typeof unsafe !== "string") return "";
    return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

// --- Manejo de Respuestas del Servidor ---
function handleServerResponse(responseString, onSuccess, reloadFn) {
    hideLoading();
    let response;
    try {
        response = JSON.parse(responseString);
    } catch (e) {
        const type = responseString.toLowerCase().includes("error") ? "error" : "success";
        mostrarMensaje(responseString, type);
        if (type === "success" && typeof reloadFn === "function") reloadFn();
        return;
    }

    if (response.success) {
        mostrarMensaje(response.message || "Operación completada exitosamente.", "success");
        if (typeof reloadFn === "function") reloadFn();
        if (typeof onSuccess === "function") onSuccess();
    } else {
        mostrarMensaje("Error: " + (response.message || "Ocurrió un error."), "error");
    }
}

function handleServerError(error) {
    hideLoading();
    console.error("Error en servidor:", error);
    mostrarMensaje("Error de comunicación con el servidor: " + error.message, "error");
}
function loadDataGenerico(config) {
    const {
        endpoint,          // Nombre de la función en Apps Script
        onSuccess,         // Función que procesa los datos
        tbodyId,           // ID del <tbody> para mensajes de error
        noDataId,          // ID del contenedor "noData"
        containerId        // ID del contenedor principal de tabla
    } = config;

    console.log(`[INFO] loadDataGenerico: solicitando datos con endpoint ${endpoint}`);
    showLoading(true);

    const runner = google.script.run
        .withSuccessHandler(function (responseString) {
            hideLoading();
            try {
                const response = typeof responseString === "string"
                    ? JSON.parse(responseString)
                    : responseString;

                if (response && Array.isArray(response.data)) {
                    onSuccess(response.data); // ✅ Callback específico
                } else {
                    console.error(`[ERROR] Formato inesperado en respuesta de ${endpoint}`, response);
                    if (tbodyId) document.getElementById(tbodyId).innerHTML =
                        "<tr><td colspan='15'>Error al cargar los datos.</td></tr>";
                    if (noDataId && containerId) {
                        document.getElementById(noDataId).style.display = "block";
                        document.getElementById(containerId).style.display = "none";
                    }
                }
            } catch (e) {
                console.error(`[ERROR] Fallo al parsear respuesta de ${endpoint}:`, e, responseString);
                if (tbodyId) document.getElementById(tbodyId).innerHTML =
                    "<tr><td colspan='15'>Error al procesar los datos.</td></tr>";
            }
        })
        .withFailureHandler(function (error) {
            hideLoading();
            console.error(`[ERROR] ${endpoint} falló:`, error);
            if (tbodyId) document.getElementById(tbodyId).innerHTML =
                "<tr><td colspan='15'>Fallo al cargar los datos.</td></tr>";
            mostrarMensaje(`Error al cargar los datos: ${error.message}`, "error");
        });

    if (runner && typeof runner[endpoint] === 'function') {
        runner[endpoint]();
    } else {
        hideLoading();
        console.error(`[ERROR] El endpoint '${endpoint}' no existe o no es una función.`);
        if (tbodyId) document.getElementById(tbodyId).innerHTML = `<tr><td colspan='15'>Error: El endpoint '${endpoint}' no es válido.</td></tr>`;
    }
}

function aplicarFiltrosYOrdenarGenerico(config) {
    const {
        dataSource,      // array global con todos los datos (ej: fullComidaData)
        setResultados,   // función para guardar resultados (ej: val => datosMostradosComida = val)
        filters,         // lista de definiciones de filtros
        fechaOrdenAsc,   // variable global booleana (ascendente o descendente)
        renderFn         // función para renderizar tabla (ej: renderPaginatedTable)
    } = config;

    console.log("[INFO] aplicando filtros genéricos...");

    let resultados = [...dataSource];

    // --- Aplicar cada filtro definido ---
    filters.forEach(f => {
        const el = document.getElementById(f.id);
        if (!el) return;
        let valor = el.value.toLowerCase().trim();
        if (!valor) return;

        if (f.type === "number") {
            const minVal = parseInt(valor, 10);
            if (!isNaN(minVal) && minVal >= 0) {
                resultados = resultados.filter(item =>
                    item[f.field] != null &&
                    parseInt(item[f.field], 10) >= minVal
                );
            }
        } else if (f.type === "date") {
            const fechaFiltro = new Date(el.value + "T00:00:00");
            if (!isNaN(fechaFiltro.getTime())) {
                resultados = resultados.filter(item => {
                    if (!item[f.field]) return false;
                    const fechaItem = new Date(item[f.field]);
                    if (isNaN(fechaItem.getTime())) return false;
                    return fechaItem.getFullYear() === fechaFiltro.getFullYear() &&
                           fechaItem.getMonth() === fechaFiltro.getMonth() &&
                           fechaItem.getDate() === fechaFiltro.getDate();
                });
            }
        } else {
            resultados = resultados.filter(item =>
                item[f.field] && item[f.field].toLowerCase().includes(valor)
            );
        }
    });

    // --- Ordenar por fecha ---
    resultados.sort((a, b) => {
        const fechaA = new Date(a["FECHA DE INGRESO"]);
        const fechaB = new Date(b["FECHA DE INGRESO"]);
        if (isNaN(fechaA) && isNaN(fechaB)) return 0;
        if (isNaN(fechaA)) return 1;
        if (isNaN(fechaB)) return -1;
        return fechaOrdenAsc ? fechaA - fechaB : fechaB - fechaA;
    });

    // --- Guardar y renderizar ---
    setResultados(resultados);
    renderFn();
}

function limpiarFiltrosGenerico(config) {
    const { filtros, aplicarFn } = config;

    filtros.forEach(f => {
        const el = document.getElementById(f.id);
        if (!el) return;

        if (f.type === "select") {
            el.value = f.defaultValue || ""; // si no se pasa default, deja vacío
        } else {
            el.value = "";
        }
    });

    if (typeof aplicarFn === "function") aplicarFn();
}
// Buscar
function searchItemsGenerico(aplicarFn) {
    if (typeof aplicarFn === "function") aplicarFn();
}

// Limpiar búsqueda específica
function clearSearchGenerico(inputId, aplicarFn) {
    const el = document.getElementById(inputId);
    if (el) el.value = "";
    if (typeof aplicarFn === "function") aplicarFn();
}

// Abrir menú de ordenamiento
function ordenarPorFechaGenerico(event, sortOptionsId) {
    event.preventDefault();
    const menu = document.getElementById(sortOptionsId);
    if (menu) {
        menu.classList.toggle("show");
    } else {
        console.error(`[ERROR] No se encontró ${sortOptionsId}`);
    }
    event.stopPropagation();
}

// Orden ascendente/descendente
function ordenarAscendenteGenerico(aplicarFn, sortOptionsId, setOrdenAsc) {
    setOrdenAsc(true);
    if (typeof aplicarFn === "function") aplicarFn();
    document.getElementById(sortOptionsId).classList.remove("show");
}

function ordenarDescendenteGenerico(aplicarFn, sortOptionsId, setOrdenAsc) {
    setOrdenAsc(false);
    if (typeof aplicarFn === "function") aplicarFn();
    document.getElementById(sortOptionsId).classList.remove("show");
}

// Mostrar/Ocultar filtros adicionales
function toggleFiltrosAdicionalesGenerico(containerId) {
    document.getElementById(containerId).classList.toggle("filtros-adicionales-ocultos");
}
// Ordenar por ID reciente
function ordenarPorIdRecienteGenerico(aplicarFn, sortOptionsId, setCriterioFn) {
    setCriterioFn("id"); // 👈 Cambia la variable global criterioDeOrden
    if (typeof aplicarFn === "function") aplicarFn();

    const sortOptionsEl = document.getElementById(sortOptionsId);
    if (sortOptionsEl) sortOptionsEl.classList.remove("show");
}

// Listener Escape que cierra modales
function registrarEscapeCierraModales(modales) {
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
            modales.forEach(fn => {
                if (typeof fn === "function") fn();
            });
        }
    });
}
// ===============================
  // --- FUNCIONES DE PRECIOS ---
  // ===============================

  function convertirPrecioFormateadoAStringNumericoParaServidor(valorFormateado) {
    if (typeof valorFormateado !== 'string' || !valorFormateado) return '0.00';
    const valorLimpio = valorFormateado.replace(/\.(?=\d{3})/g, '').replace(',', '.');
    const num = parseFloat(valorLimpio.replace(/[^\d.-]/g, ''));
    return isNaN(num) ? '0.00' : num.toFixed(2);
  }

  function validarFormatoPrecio(inputElement) {
    const errorSpanId = inputElement.id === 'precioAgregarComida' ? 'errorPrecioAgregarComida' : 'errorPrecioEditarComida';
    const errorSpan = document.getElementById(errorSpanId);
    let valor = inputElement.value.trim();

    if (valor === '') {
      if (errorSpan) {
        errorSpan.textContent = 'El precio es obligatorio.';
        errorSpan.style.display = 'inline';
      }
      return false;
    }
    const valorNumerico = parseInputPrecioCOP(valor);
    if (isNaN(valorNumerico) || valorNumerico < 0) {
      if (errorSpan) {
        errorSpan.textContent = 'Formato de precio inválido. Use números positivos (ej: 1234,50 o 20.000).';
        errorSpan.style.display = 'inline';
      }
      return false;
    }
    if (errorSpan) errorSpan.style.display = 'none';
    return true;
  }

  function parseInputPrecioCOP(valorActual) {
    if (typeof valorActual !== 'string') return NaN;
    let cleanedForParse = valorActual.replace(/[$\s]/g, '');
    cleanedForParse = cleanedForParse.replace(/\./g, '');
    cleanedForParse = cleanedForParse.replace(/,/g, '.');
    return parseFloat(cleanedForParse);
  }

  function formatearPrecio(inputElement, moneda = 'COP', locale = 'es-CO') {
    if (!inputElement) return;
    let valorNumerico = parseInputPrecioCOP(inputElement.value);
    if (isNaN(valorNumerico)) {
      if (inputElement.value.trim() !== '') return;
      valorNumerico = 0;
    }
    inputElement.value = valorNumerico.toLocaleString(locale, {
      style: 'currency',
      currency: moneda,
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  // ===============================
  // --- FUNCIONES DE FECHAS ---
  // ===============================

  function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return 'Fecha Inválida';
    return date.toLocaleDateString('es-CO', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'UTC' });
  }

  function formatDateForComparison(dateString) {
    if (!dateString) return null;
    if (dateString instanceof Date) return dateString;
    let date;
    if (typeof dateString === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateString)) {
      const parts = dateString.split('-');
      date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    } else {
      date = new Date(dateString);
    }
    return isNaN(date.getTime()) ? null : date;
  }


</script>
