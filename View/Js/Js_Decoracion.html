<script>
(function() {
    // ===================================================
    // --- ESTADO Y CONFIGURACIÓN DEL MÓDULO DECORACION ---
    // ===================================================
    const pageState = {
        fullData: [],
        datosMostrados: [],
        currentPage: 1,
        itemsPerPage: 10,
        productoAEditarId: null,
        productoRetiroSeleccionado: null,
        fechaOrdenAscendente: false, // Para ordenamiento por fecha
    };

    const FILTROS = [
        { id: "buscarProducto", field: "PRODUCTO", type: "text" },
        { id: "filtroTipo", field: "TIPO", type: "text" },
        { id: "filtroEstado", field: "Estado", type: "select", defaultValue: "activo" }
    ];

    // =======================================
    // --- CARGA DE DATOS ---
    // =======================================
    function loadDecoracion() {
        loadDataGenerico({
            endpoint: "getDecoracionData",
            tbodyId: "tablaBody",
            noDataId: "noData",
            containerId: "tableContainer",
            onSuccess: function(data) {
                pageState.fullData = data;
                aplicarFiltrosYOrdenar();
            }
        });
    }

    // ============================================
    // --- RENDERIZADO DE TABLA Y PAGINACIÓN ---
    // ============================================
    function renderPaginatedTable() {
        const tbody = document.getElementById("tablaBody");
        tbody.innerHTML = "";
        if (pageState.datosMostrados.length === 0) {
            tbody.innerHTML = `<tr><td colspan='10' style='text-align:center;'>No hay productos que coincidan con los filtros.</td></tr>`;
            document.getElementById("pagination").innerHTML = "";
            return;
        }

        const start = (pageState.currentPage - 1) * pageState.itemsPerPage;
        const paginatedItems = pageState.datosMostrados.slice(start, start + pageState.itemsPerPage);

        paginatedItems.forEach(item => {
            const row = tbody.insertRow();
            const unidadesDisponibles = parseInt(item["Disponibles"]) || 0;
            row.innerHTML = `
                <td>${item["Id"] || ''}</td>
                <td>${escapeHtml(item["PRODUCTO"] || '')}</td>
                <td>${escapeHtml(item["TIPO"] || '')}</td>
                <td>${escapeHtml(item["COLOR"] || '')}</td>
                <td>${formatDate(item["FECHA DE INGRESO"])}</td>
                <td>${item["Cantidad"] || 0}</td>
                <td class="${unidadesDisponibles === 0 ? 'agotado' : ''}">${unidadesDisponibles}</td>
                <td>${item["Imagen"] ? `<ion-icon name="open-outline" style="cursor:pointer; font-size: 22px; color: #007bff;" onclick="abrirImagenNuevaVentana('${item["Imagen"]}')"></ion-icon>` : 'N/A'}</td>
                <td>${escapeHtml(item["Estado"] || '')}</td>
                <td>
                    <button class="btn-modificar" title="Editar" onclick="abrirModalEditar('${item["Id"]}')"><ion-icon name="create-outline"></ion-icon></button>
                    <button class="btn-retirar" title="Retirar" onclick="abrirModalRetiro('${item["Id"]}', '${escapeHtml(item["PRODUCTO"])}', ${unidadesDisponibles})"><ion-icon name="bag-handle-outline"></ion-icon></button>
                    <button class="btn-eliminar" title="Desactivar" onclick="confirmarEliminar('${item["Id"]}', '${escapeHtml(item["PRODUCTO"])}')"><ion-icon name="trash-bin-outline"></ion-icon></button>
                </td>
            `;
        });
        
        renderPaginationControls({
            totalItems: pageState.datosMostrados.length,
            pageState: pageState,
            paginationElementId: "pagination",
            onPageChangeFn: changePage
        });
    }

    function changePage(page) {
        changePageGeneric(page, pageState, renderPaginatedTable);
    }

    // =========================================
    // --- FILTRADO Y ORDENAMIENTO ---
    // =========================================
    function aplicarFiltrosYOrdenar() {
        aplicarFiltrosYOrdenarGenerico({
            dataSource: pageState.fullData,
            setResultados: (resultados) => {
                pageState.datosMostrados = resultados;
                pageState.currentPage = 1;
            },
            filters: FILTROS,
            fechaOrdenAsc: pageState.fechaOrdenAscendente,
            renderFn: renderPaginatedTable
        });
    }

    function limpiarFiltros() {
        limpiarFiltrosGenerico({
            filtros: FILTROS,
            aplicarFn: aplicarFiltrosYOrdenar
        });
    }

    // ===================================
    // --- MANEJO DE MODALES ---
    // ===================================
    function abrirModalAgregar() {
        document.getElementById("agregarForm").reset();
        abrirModal("modalAgregar");
    }

    function abrirModalRetiro(id, producto, unidadesDisponibles) {
        pageState.productoRetiroSeleccionado = { id, producto, unidadesDisponibles };
        const form = document.getElementById("retiroForm");
        form.reset();
        document.getElementById("productoIdRetiro").textContent = id;
        document.getElementById("productoNombreRetiro").textContent = producto;
        document.getElementById("unidadesDisponiblesRetiro").textContent = unidadesDisponibles;
        document.getElementById("unidadesRetirar").max = unidadesDisponibles;
        abrirModal("modalRetiro");
    }

    function abrirModalEditar(id) {
        const producto = pageState.fullData.find(item => String(item.Id) === String(id));
        if (producto) {
            pageState.productoAEditarId = id;
            const form = document.getElementById("editarForm");
            form.reset();
            document.getElementById("productoIdEditar").textContent = id;
            document.getElementById("productoEditar").value = producto["PRODUCTO"];
            document.getElementById("tipoEditar").value = producto["TIPO"];
           
            document.getElementById("unidadesAgregarEditar").value = "0"; // Siempre se inicia en 0 para agregar más
            abrirModal("modalEditar");
        } else {
            mostrarMensaje("Error: No se pudo encontrar el producto para editar.", "error");
        }
    }

    // =========================================
    // --- ACCIONES CRUD (ELIMINAR) ---
    // =========================================
    function confirmarEliminar(id, nombre) {
        confirmarEliminarGenerico({
            id: id,
            nombre: nombre,
            endpoint: 'eliminarDecoracion',
            reloadFn: loadDecoracion
        });
    }

    // ===============================================
    // --- INICIALIZACIÓN DE LA PÁGINA ---
    // ===============================================
    function inicializarPagina() {
        // Carga inicial de datos
        loadDecoracion();

        // Listeners para filtros
        setupFilterListeners(FILTROS, aplicarFiltrosYOrdenar);

        // Listener para el botón de limpiar filtros
        document.getElementById("limpiarFiltrosBtn").addEventListener("click", limpiarFiltros);

        // Listener para mostrar/ocultar filtros adicionales
        document.getElementById('toggleFiltrosIconContainer').addEventListener('click', () => {
            toggleFiltrosAdicionalesGenerico('filtrosAdicionalesContainer');
        });

        // Configuración de envío de formularios
        setupFormSubmit({
            formId: "agregarForm",
            endpoint: "agregarDecoracion",
            reloadFn: loadDecoracion,
            onSuccess: () => cerrarModal('modalAgregar'),
            dataBuilder: (form) => ({
                producto: form.productoAgregar.value.trim(),
                tipo: form.tipoAgregar.value.trim(),
                color: form.colorAgregar.value.trim(),
                cantidad: parseFloat(form.cantidadAgregar.value),
            })
        });

        setupFormSubmit({
            formId: "editarForm",
            endpoint: "actualizarDecoracion",
            reloadFn: loadDecoracion,
            onSuccess: () => cerrarModal('modalEditar'),
            dataBuilder: (form) => ({
                id: pageState.productoAEditarId,
                producto: form.productoEditar.value.trim(),
                tipo: form.tipoEditar.value.trim(),
                color: form.colorEditar.value.trim(),
                unidades: parseFloat(form.unidadesAgregarEditar.value),
            })
        });

        setupFormSubmit({
            formId: "retiroForm",
            endpoint: "retirarDecoracion",
            reloadFn: loadDecoracion,
            onSuccess: () => cerrarModal('modalRetiro'),
            dataBuilder: (form) => ({
                id: pageState.productoRetiroSeleccionado.id,
                unidades: parseInt(form.unidadesRetirar.value, 10)
            })
        });

        // Registrar tecla Escape para cerrar modales
        registrarEscapeCierraModales(["modalAgregar", "modalEditar", "modalRetiro"]);
    }

    // --- INICIO ---
    document.addEventListener('DOMContentLoaded', inicializarPagina);

    // Exponer funciones al scope global para que los `onclick` en el HTML funcionen
    window.abrirModalAgregar = abrirModalAgregar;
    window.abrirModalRetiro = abrirModalRetiro;
    window.abrirModalEditar = abrirModalEditar;
    window.confirmarEliminar = confirmarEliminar;
    window.changePage = changePage;
    window.abrirImagenNuevaVentana = abrirImagenNuevaVentana;

})();
</script>
